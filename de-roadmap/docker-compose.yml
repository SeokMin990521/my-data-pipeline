services:
  # 11일차: 데이터 저장소 및 레지스트리
  airflow-worker:  # 태스크를 실행하는 서비스 이름 아래에 추가
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.7.1}
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: my-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data-network
    extra_hosts:
      - "host.docker.internal:host-gateway" # 💡 컨테이너에게 호스트 게이트웨이 IP를 맵핑해줍니다

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: my-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - data-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.3.0
    container_name: my-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data-network

  # 13일차: 오브젝트 스토리지 (데이터 레이크)
  minio:
    image: minio/minio:RELEASE.2023-08-29T23-07-35Z
    container_name: my-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    networks:
      - data-network

  # 14일차: 대용량 분산 연산 엔진 (독립 실행 및 무한 대기 세팅)
  spark:
    image: apache/spark:3.5.0
    container_name: my-spark
    user: root
    entrypoint: ["/bin/bash", "-c", "tail -f /dev/null"]
    volumes:
      - .:/opt/spark/app
    networks:
      - data-network

networks:
  data-network:
    driver: bridge
