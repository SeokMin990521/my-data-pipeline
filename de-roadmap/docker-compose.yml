services:
  # 11일차: 데이터 저장소 및 레지스트리
# 1) postgres 서비스 내부 volumes 수정
  postgres:
    image: postgres:15
    container_name: my-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_db
    volumes:
      - pg-data-volume:/var/lib/postgresql/data  # ◀ 기존 ./postgres_data 지우고 이렇게 변경!
    networks:
      - data-network
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: my-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: my-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092,PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_OPTS=-Djdk.lang.ProcessHandle.minusOne=true
    networks:
      - data-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.3.0
    container_name: my-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data-network

  # [추가] 8080 포트: Kafka UI 설정
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: my-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    networks:
      - data-network

  # 13일차: 오브젝트 스토리지 (데이터 레이크)
  minio:
    image: minio/minio:RELEASE.2023-08-29T23-07-35Z
    container_name: my-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin      # ◀ 로그인 ID를 일관되게 변경
      MINIO_ROOT_PASSWORD: minioadmin  # ◀ 로그인 PW를 일관되게 변경
    command: server /data --console-address ":9001"
    networks:
      - data-network

  # 14일차: 대용량 분산 연산 엔진
  spark:
    image: apache/spark:3.5.0
    container_name: my-spark
    user: root
    entrypoint: ["/bin/bash", "-c", "tail -f /dev/null"]
    volumes:
      - .:/opt/spark/app
    networks:
      - data-network

  # [추가] 3000 포트: Grafana 모니터링 세팅
  grafana:
    image: grafana/grafana:latest
    container_name: my-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - data-network

  # [추가] 8085 포트: Adminer DB 관리 도구 세팅
  adminer:
    image: adminer:latest
    container_name: my-adminer
    ports:
      - "8085:8080"
    links:
      - postgres:postgres
    networks:
      - data-network

networks:
  data-network:
    driver: bridge

volumes:
  pg-data-volume:
